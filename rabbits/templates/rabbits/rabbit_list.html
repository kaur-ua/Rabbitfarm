{% extends "base.html" %}

{% block content %}

<h2>Журнал обліку кроликів</h2>

<table class="table">
    <thead>
        <tr>
            <th>№</th>
            <th>Кличка</th>
            <th>Стать</th>
            <th>Порода</th>
            <th>Остання подія</th>
            <th>Наступна дія</th>
            <th>Статус</th>
        </tr>
    </thead>
    <tbody>
        {% for rabbit in rabbits %}
        <tr>
            <td>{{ rabbit.inventory_number }}</td>
            <td>{{ rabbit.name }}</td>
            <td>{{ rabbit.sex }}</td>
            <td>{{ rabbit.breed }}</td>
            <td>—</td>
            <td>—</td>
            <td>🟢</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
