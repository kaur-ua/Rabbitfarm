<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - RabbitFarm</title>
</head>

<body style="font-family: Arial; background-color: #f8f9f5; margin: 0;">

    <div style="
        width: 520px;
        margin: 80px auto;
        padding: 30px;
        background-color: #f3f8f1;
        border: 1px solid #e5e5e5;
        box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        text-align: center;
    ">

        <div style="font-size: 50px;">🐇</div>

        <h1>RabbitFarm</h1>

        <h2>Signup</h2>

        <p style="margin-bottom: 20px;">
            Створіть обліковий запис і зареєструйте свою ферму в RabbitFarm
        </p>

        <form method="post">
            {% csrf_token %}

            {% if form.errors %}
                <div style="
                    color: red;
                    border: 1px solid red;
                    padding: 10px;
                    margin-bottom: 10px;
                ">
                    <strong>Будь ласка, виправте помилки:</strong>
                    {{ form.errors }}
                </div>
            {% endif %}

            {{ form.as_p }}
            <div style="margin-top: 15px;">
    <button type="submit" style="padding: 6px 20px;">
        Signup
    </button>
            </div>
            
        </form>

    </div>

    <footer style="
        margin-top: 40px;
        padding: 15px;
        font-size: 13px;
        color: gray;
        border-top: 1px solid #ddd;
        text-align: center;
    ">
        © 2026 RabbitFarm Systems | Ukraine | e-mail: uyriyy2007@gmail.com | phone: +380660891181
    </footer>

</body>
</html>
