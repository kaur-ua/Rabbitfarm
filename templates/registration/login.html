<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RabbitFarm</title>
</head>

<body style="font-family: Arial; background-color: #f8f9f5; margin: 0;">

    <div style="
        width: 420px;
        margin: 80px auto;
        padding: 30px;
        background-color: white;
        border: 1px solid #e5e5e5;
        box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        text-align: center;
    ">

        <div style="font-size: 50px;">🐇</div>

        <h1>RabbitFarm</h1>

        <h2>Login</h2>

<p style="margin-bottom: 20px;">
    Вхід до системи управління фермою
</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
        <p style="margin-top: 15px; color: gray; font-size: 14px;">
    Відновлення пароля буде доступне пізніше
</p>

    </div>

    <footer style="
        margin-top: 40px;
        padding: 15px;
        font-size: 13px;
        color: gray;
        border-top: 1px solid #ddd;
        text-align: center;
    ">
        © 2026 RabbitFarm Systems | Ukraine | e-mail: uyriyy2007@gmail.com | phone: +380660891181
    </footer>

</body>
</html>
