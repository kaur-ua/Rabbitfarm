<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RabbitFarm Maintenance</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7fbf7;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .maintenance-card {
            max-width: 600px;
            background: white;

            padding: 50px 40px;

            border-radius: 28px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.08);

            text-align: center;
        }

        .logo {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
            color: #2e7d32;
        }

        p {
            font-size: 18px;
            line-height: 1.7;
            color: #555;
        }

        .status {
            margin-top: 30px;

            display: inline-block;

            padding: 12px 22px;

            background: #2e7d32;
            color: white;

            border-radius: 12px;

            font-weight: bold;
        }

        @media (max-width: 768px) {

            .maintenance-card {
                padding: 35px 25px;
            }

            h1 {
                font-size: 32px;
            }

            p {
                font-size: 16px;
            }

        }

    </style>

</head>
<body>

    <div class="maintenance-card">

        <div class="logo">🐇</div>

        <h1>RabbitFarm</h1>

        <p>
           RabbitFarm is currently undergoing scheduled maintenance.
        </p>

        <p>
            We’ll be back soon.
        </p>

        <div class="status">
            Technical maintenance
        </div>

    </div>

</body>
</html>
