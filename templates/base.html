{% load static %}
<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RabbitFarm</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
<link rel="stylesheet" href="{% static 'css/background.css' %}">
<link rel="stylesheet" href="{% static 'css/farm.css' %}">

</head>
<body>



<nav class="navbar navbar-expand-lg navbar-dark bg-success px-3">

{% if farm %}
<a href="{% url 'farm_page' %}" class="navbar-brand">
    {{ farm.name }}
</a>
{% endif %}

<button class="navbar-toggler" type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
        aria-controls="mainNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation">

    <span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="mainNavbar">

    <div class="navbar-nav ms-auto">

        <a class="nav-link text-white" href="{% url 'home' %}">
            HOME
        </a>

        <a class="nav-link text-white" href="{% url 'rabbit_list' %}">
            Rabbit Records
        </a>

        <a class="nav-link text-white" href="{% url 'group_list' %}">
            Groups
        </a>

        <a class="nav-link text-white" href="{% url 'add_event' %}">
            Events
        </a>
        <a class="nav-link text-white" href="{% url 'feedback' %}">
            Feedback
        </a>

        <form action="{% url 'logout' %}"
              method="post"
              class="d-flex align-items-center">

            {% csrf_token %}

            <button type="submit"
                    class="btn btn-link nav-link text-white text-decoration-none">

                Logout
            </button>

        </form>

    </div>

</div>

</nav>
<!-- <div class="container mt-4"> -->
<div class="container-fluid mt-4 px-3">

{% block content %}
{% endblock %}

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
