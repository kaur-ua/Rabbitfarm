{% load static %}
<!DOCTYPE html>
<html>

<head>
<title>RabbitFarm</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>

<body style="background-color: rgba(40, 167, 69, 0.10);">

<nav class="navbar navbar-dark bg-success px-3">

{% if farm %}
<a href="{% url 'farm_page' %}" class="navbar-brand">
    {{ farm.name }}
</a>
{% endif %}

<div class="ms-auto">

<a class="text-white me-3" href="{% url 'home' %}">HOME</a>
<a class="text-white me-3" href="{% url 'rabbit_list' %}">Journal</a>
<a class="text-white me-3" href="{% url 'group_list' %}">Groups</a>
<a class="text-white me-3" href="{% url 'add_event' %}">Events</a>
<form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-link text-white p-0 text-decoration-none">
        Logout
    </button>
</form>
</div>

</nav>
<div class="container mt-4">

{% block content %}
{% endblock %}

</div>

</body>
</html>
